# 평행 그리퍼: Robotiq 2F-140
# 출처: Robotiq 공식 Instruction Manual
# 등록일: 2026-03-04
# 비고: 임시 등록 (실제 보유 그리퍼 확인 후 교체 가능)

equipment_type: parallel-gripper
name: "Robotiq 2F-140"
manufacturer: "Robotiq"
model: "2F-140"

# 그리퍼 사양
gripper:
  type: parallel                 # parallel / angular / vacuum
  stroke_mm: 140                 # 최대 개폐 거리
  grip_force_n_min: 10           # 최소 파지력
  grip_force_n_max: 125          # 최대 파지력
  finger_count: 2
  speed_mm_s_min: 30             # 최소 동작 속도
  speed_mm_s_max: 250            # 최대 동작 속도
  open_close_time_s: 0.8         # 전 스트로크 기준 약 140mm/180mm/s
  weight_kg: 1.025
  payload_kg: 2.5                # 최대 파지 하중
  position_repeatability_mm: 0.08

# 외형 치수
dimensions:
  height_mm: 232.8
  width_mm: 202.1
  min_object_diameter_mm: 90     # 핑거 내측 최소 잡기 직경

# 로봇 장착 정보
mounting:
  flange_type: "ISO 9409-1"      # 어댑터 별매
  tcp_offset:                    # 플랜지→TCP 오프셋 (단위: m)
    x: 0
    y: 0
    z: 0.2328                    # 그리퍼 높이 기준 (핑거팁까지)

# 전기 사양
electrical:
  voltage_v: 24                  # DC 24V ±10%
  communication: "Modbus RTU"    # 시리얼 통신

# 통신
communication:
  protocol: "Modbus RTU"
  ros2_action: "/gripper_controller/gripper_cmd"

# 시뮬레이션 모델
simulation:
  urdf_path: ""                  # ⚠️ 추후 URDF 제작 시 입력
  mesh_path: ""                  # ⚠️ 추후 메쉬 확보 시 입력
